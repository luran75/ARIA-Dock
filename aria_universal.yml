name: aria
channels:
  - conda-forge
  - bioconda
dependencies:
  # ---------- Python ----------
  - python=3.10

  # ---------- Core scientific stack ----------
  - numpy>=1.24,<2
  - pandas>=2.0,<2.2
  - scipy>=1.10,<1.14
  - scikit-learn>=1.3,<1.5

  # ---------- Machine learning ----------
  - xgboost>=2.0
  - catboost>=1.2
  - shap>=0.45
  - optuna>=4.0
  - joblib>=1.3

  # ---------- Visualization ----------
  - matplotlib>=3.9
  - seaborn>=0.13
  - plotly>=5.0
  - ipython>=8.0

  # ---------- Chemistry & docking ----------
  - rdkit=2023.09.6
  - datamol>=0.12
  - medchem>=2.0.5
  - openbabel>=3.1.1
  - smina=2020.12.10
  - fpocket>=4.0     
  - biopython>=1.83
  - pdbfixer>=1.9
  - openmm>=8.0

  # ---------- Utilities ----------
  - tqdm>=4.60
